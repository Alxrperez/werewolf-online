upstream werewolf_server {
    server server:3000;
}

server {
    listen 80;
    server_name _;

    # ─── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml font/woff2;
    gzip_min_length 1024;

    # ─── Static client assets ────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Cache-bust hashed assets (Vite fingerprints JS/CSS)
    location ~* \.(js|css|woff2?|png|jpg|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── Socket.IO WebSocket proxy ───────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://werewolf_server;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep long-lived connections open
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ─── REST API proxy ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://werewolf_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ping {
        proxy_pass http://werewolf_server;
    }

    # ─── SPA fallback — all other paths serve index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
